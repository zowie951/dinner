<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐人數統計</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-indigo-600 p-6 text-center text-white">
            <p class="text-sm opacity-80 uppercase tracking-widest">目前統計人數</p>
            <h1 id="totalDisplay" class="text-5xl font-bold mt-1">0</h1>
        </div>

        <div class="p-6 space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">📍 選擇今日餐廳</label>
                <div class="flex gap-2">
                    <select id="resSelect" class="flex-1 border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500"></select>
                    <button onclick="addNewRes()" class="bg-gray-100 px-3 rounded-lg text-gray-600 hover:bg-gray-200">+</button>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-sm font-medium text-gray-700">➕ 新增人數</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="sendData(1)" class="bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl border border-indigo-100 hover:bg-indigo-100">+1</button>
                    <button onclick="sendData(2)" class="bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl border border-indigo-100 hover:bg-indigo-100">+2</button>
                    <button onclick="sendData(3)" class="bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl border border-indigo-100 hover:bg-indigo-100">+3</button>
                    <button onclick="sendData(4)" class="bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl border border-indigo-100 hover:bg-indigo-100">+4</button>
                </div>
                <button onclick="customAdd()" class="w-full bg-white text-gray-600 py-2 rounded-lg border border-dashed border-gray-300 hover:border-indigo-400">客製化人數...</button>
            </div>

            <hr class="border-gray-100">

            <button onclick="cancelAll()" class="w-full py-3 bg-red-50 text-red-600 font-medium rounded-xl hover:bg-red-100 transition">
                🚫 撤銷我的所有報名
            </button>
        </div>
    </div>

    <p id="status" class="text-center text-xs text-gray-400 mt-4 italic">正在連線...</p>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRzWAY4qbq_51OYThgBp4h0aYga8H0-297Q1bGDnl8IIYSrZHHW52hhBn_ZrRGzY-hYA/exec';
        let userProfile = null;

        async function init() {
            await liff.init({ liffId: "你的_LIFF_ID" });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            userProfile = await liff.getProfile();
            fetchData();
        }

        async function fetchData() {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            document.getElementById('totalDisplay').innerText = data.totalCount;
            const select = document.getElementById('resSelect');
            select.innerHTML = data.restaurants.map(r => `<option value="${r}">${r}</option>`).join('');
            document.getElementById('status').innerText = '資料已同步';
        }

        async function sendData(num) {
            document.getElementById('status').innerText = '儲存中...';
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'addRecord',
                    userId: userProfile.userId,
                    userName: userProfile.displayName,
                    count: num
                })
            });
            fetchData();
        }

        function customAdd() {
            const n = prompt("請輸入人數：");
            if (n && !isNaN(n)) sendData(parseInt(n));
        }

        async function cancelAll() {
            if (!confirm("確定要取消您的所有報名嗎？")) return;
            document.getElementById('status').innerText = '正在撤銷...';
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'cancelRecord', userId: userProfile.userId })
            });
            fetchData();
        }

        async function addNewRes() {
            const name = prompt("請輸入新餐廳名稱：");
            if (name) {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addRestaurant', restaurantName: name })
                });
                fetchData();
            }
        }

        init();
    </script>
</body>
</html>
